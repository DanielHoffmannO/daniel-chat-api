<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat IA - Daniel Hoffmann</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
#app { display: none; flex-direction: column; height: 100vh; max-width: 700px; margin: 0 auto; width: 100%; }
header { padding: 16px 20px; border-bottom: 1px solid #2a2a4a; text-align: center; }
header h1 { font-size: 1.1rem; color: #a78bfa; }
header p { font-size: 0.8rem; color: #888; margin-top: 4px; }
#messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 80%; padding: 12px 16px; border-radius: 16px; line-height: 1.5; font-size: 0.9rem; animation: fadeIn 0.3s ease; }
.msg.bot { align-self: flex-start; background: #2a2a4a; border-bottom-left-radius: 4px; }
.msg.user { align-self: flex-end; background: #6c3bd1; color: #fff; border-bottom-right-radius: 4px; }
.msg.system { align-self: center; background: none; color: #888; font-size: 0.8rem; font-style: italic; }
.typing { align-self: flex-start; padding: 12px 16px; background: #2a2a4a; border-radius: 16px; }
.typing span { display: inline-block; width: 8px; height: 8px; background: #888; border-radius: 50%; margin: 0 2px; animation: bounce 1.4s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
#suggestions { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 20px; }
#suggestions button { background: #2a2a4a; border: 1px solid #3a3a5a; color: #c0c0c0; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: background 0.2s; }
#suggestions button:hover { background: #3a3a5a; }
#input-area { padding: 16px 20px; border-top: 1px solid #2a2a4a; display: flex; gap: 10px; }
#input-area input { flex: 1; background: #2a2a4a; border: 1px solid #3a3a5a; color: #e0e0e0; padding: 12px 16px; border-radius: 24px; font-size: 0.9rem; outline: none; }
#input-area input:focus { border-color: #6c3bd1; }
#input-area button { background: #6c3bd1; border: none; color: #fff; padding: 12px 20px; border-radius: 24px; cursor: pointer; font-size: 0.9rem; transition: background 0.2s; }
#input-area button:hover { background: #7c4be0; }
#input-area button:disabled { background: #444; cursor: not-allowed; }
.msg strong { font-weight: 600; }
.msg em { font-style: italic; }
.msg ul, .msg ol { margin: 4px 0 4px 20px; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }
#offline { display: none; height: 100vh; align-items: center; justify-content: center; color: #666; font-size: 0.9rem; }
</style>
</head>
<body>
<div id="offline">Página não disponível no momento.</div>
<div id="app">
  <header>
    <h1>🤖 Chat com IA - Daniel Hoffmann</h1>
    <p>Pergunte sobre experiência, projetos ou formação</p>
  </header>
  <div id="messages"></div>
  <div id="suggestions">
    <button onclick="send('Quais tecnologias ele usa?')">Quais tecnologias ele usa?</button>
    <button onclick="send('Fale sobre a robótica')">Fale sobre a robótica</button>
    <button onclick="send('Qual a formação dele?')">Qual a formação dele?</button>
    <button onclick="send('Quais projetos ele tem?')">Quais projetos ele tem?</button>
  </div>
  <div id="input-area">
    <input type="text" id="input" placeholder="Digite sua pergunta..." autocomplete="off">
    <button id="send-btn" onclick="sendInput()">Enviar</button>
  </div>
</div>
<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const suggestions = document.getElementById('suggestions');
let count = 0;
const MAX = 20;

async function init() {
  try {
    const ctrl = new AbortController();
    setTimeout(() => ctrl.abort(), 3000);
    const r = await fetch('/api/health', { signal: ctrl.signal });
    if (!r.ok) throw new Error();
    document.getElementById('app').style.display = 'flex';
    addMsg('bot', 'Olá! Sou o assistente do Daniel. Pergunte sobre sua experiência, projetos ou formação.');
  } catch {
    document.getElementById('offline').style.display = 'flex';
  }
}

function addMsg(type, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.innerHTML = type === 'bot' ? formatMd(text) : esc(text);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function formatMd(t) {
  return esc(t)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    .replace(/\n/g, '<br>');
}

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

async function send(text) {
  if (count >= MAX) return;
  count++;
  suggestions.style.display = 'none';
  addMsg('user', text);

  if (count === MAX - 2) addMsg('system', 'Você tem mais 2 perguntas nesta sessão.');
  if (count >= MAX) {
    addMsg('system', 'Limite atingido. Recarregue a página para recomeçar.');
    input.disabled = true; sendBtn.disabled = true;
    return;
  }

  showTyping();
  input.disabled = true; sendBtn.disabled = true;
  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await r.json();
    hideTyping();
    addMsg('bot', data.response || data.error || 'Erro ao obter resposta.');
  } catch {
    hideTyping();
    addMsg('bot', 'Desculpe, ocorreu um erro. Tente novamente.');
  }
  input.disabled = false; sendBtn.disabled = false;
  input.focus();
}

function sendInput() { const t = input.value.trim(); if (t) { input.value = ''; send(t); } }
input.addEventListener('keydown', e => { if (e.key === 'Enter') sendInput(); });
init();
</script>
</body>
</html>
